<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mi Sector Hoy</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #f5a623;
      --accent2: #e8f542;
      --text: #eef0f6;
      --muted: #7a7f99;
      --success: #42e695;
      --error: #ff5c5c;
      --border: rgba(255,255,255,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 18px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .header-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .header-logo span { color: var(--text); }

    .header-date-chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .date-block { margin-bottom: 24px; }

    .date-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 14px 18px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .date-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .date-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      text-transform: capitalize;
    }

    .date-change-btn {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .date-change-btn:hover { color: var(--accent); border-color: var(--accent); }

    .date-picker-wrap {
      margin-top: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      display: none;
    }

    .date-picker-wrap.open { display: block; }

    .date-picker-wrap input[type="date"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      padding: 10px 14px;
      border-radius: 4px;
      outline: none;
    }

    .date-picker-wrap input[type="date"]:focus { border-color: var(--accent); }

    .search-block { margin-bottom: 28px; }

    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      font-weight: 500;
      padding: 16px 80px 16px 18px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }

    .search-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(232,245,66,0.08);
    }

    .search-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      border: none;
      color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .search-btn:hover { background: #ffb940; }
    .search-btn:active { transform: translateY(-50%) scale(0.96); }

    .result-area { min-height: 60px; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      background: var(--surface2);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .result-header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      flex-shrink: 0;
    }

    .result-header-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-body { padding: 20px 18px; }

    .result-sector-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .result-sector-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .result-notes-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .result-notes-value {
      font-size: 14px;
      color: var(--text);
      background: var(--surface2);
      border-left: 3px solid var(--accent2);
      padding: 10px 14px;
      border-radius: 4px;
      line-height: 1.5;
    }

    .result-franco {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 14px;
    }

    .result-franco strong { color: var(--text); }

    .result-no-notes {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    .not-found-card {
      background: var(--surface);
      border: 1px solid rgba(255,92,92,0.3);
      border-left: 3px solid var(--error);
      border-radius: 8px;
      padding: 20px 18px;
      animation: slideUp 0.3s ease;
    }

    .not-found-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--error);
      margin-bottom: 6px;
    }

    .not-found-sub { font-size: 13px; color: var(--muted); }

    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 18px;
      text-align: center;
      animation: slideUp 0.3s ease;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .error-card {
      background: var(--surface);
      border: 1px solid rgba(255,92,92,0.3);
      border-left: 3px solid var(--error);
      border-radius: 8px;
      padding: 16px 18px;
      font-size: 13px;
      color: var(--error);
      animation: slideUp 0.3s ease;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    @media (max-width: 360px) {
      .result-sector-value { font-size: 34px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">Mi<span>Sector</span></div>
    <div class="header-date-chip" id="headerDateChip">—</div>
  </header>

  <div class="container">

    <div class="date-block">
      <div class="section-label">Fecha consultada</div>
      <div class="date-display" onclick="toggleDatePicker()">
        <div>
          <div class="date-main" id="dateDayDisplay">—</div>
          <div class="date-sub" id="dateFullDisplay">—</div>
        </div>
        <button class="date-change-btn">Cambiar</button>
      </div>
      <div class="date-picker-wrap" id="datePickerWrap">
        <input type="date" id="datePickerInput" onchange="onDateChange()" />
      </div>
    </div>

    <div class="search-block">
      <div class="section-label">Buscar empleado</div>
      <div class="search-wrap">
        <input
          class="search-input"
          id="nameInput"
          type="text"
          placeholder="Escribí tu nombre..."
          onkeydown="if(event.key==='Enter') buscar()"
          autocomplete="off"
          autocorrect="off"
        />
        <button class="search-btn" onclick="buscar()">Buscar</button>
      </div>
    </div>

    <div class="result-area" id="resultArea"></div>

    <footer>MI SECTOR HOY &nbsp;·&nbsp; v1.0</footer>
  </div>

  <script>
    const SHEET_ID = '1L8eyFwLA1EGOXnm9q2uDI-L_NA8OAneOQsNQACVY6AU';
    let currentDate = new Date();

    function pad(n) { return String(n).padStart(2, '0'); }

    function init() {
      updateDateDisplay(currentDate);
    }

    function updateDateDisplay(date) {
      const day = pad(date.getDate());
      const fullStr = date.toLocaleDateString('es-AR', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      document.getElementById('dateDayDisplay').textContent = day;
      document.getElementById('dateFullDisplay').textContent = fullStr;
      document.getElementById('datePickerInput').value =
        `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
      const chip = date.toLocaleDateString('es-AR', { day: '2-digit', month: 'short' });
      document.getElementById('headerDateChip').textContent = chip.toUpperCase();
    }

    function toggleDatePicker() {
      document.getElementById('datePickerWrap').classList.toggle('open');
    }

    function onDateChange() {
      const val = document.getElementById('datePickerInput').value;
      if (!val) return;
      const [y, m, d] = val.split('-').map(Number);
      currentDate = new Date(y, m - 1, d);
      updateDateDisplay(currentDate);
      document.getElementById('datePickerWrap').classList.remove('open');
      if (document.getElementById('nameInput').value.trim()) buscar();
    }

    async function buscar() {
      const name = document.getElementById('nameInput').value.trim();
      const resultArea = document.getElementById('resultArea');

      if (!name) {
        resultArea.innerHTML = `<div class="error-card">Escribí tu nombre para buscar.</div>`;
        return;
      }

      // Intentar con "09" y también con "9" por si la hoja no tiene cero adelante
      const dayNum = currentDate.getDate();
      const sheetNamePadded = pad(dayNum);       // "09"
      const sheetNameRaw    = String(dayNum);    // "9"

      resultArea.innerHTML = `
        <div class="loading-card">
          <div class="spinner"></div>
          <div class="loading-text">Consultando planilla...</div>
        </div>`;

      try {
        // Fetch directo — probamos "09" y "9" como nombre de hoja
        async function fetchSheet(sheetName) {
          const range = encodeURIComponent(`${sheetName}!A3:E`);
          const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=${range}`;
          const res = await fetch(url);
          const text = await res.text();
          const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)?.[1];
          if (!jsonStr) return [];
          const data = JSON.parse(jsonStr);
          return data?.table?.rows || [];
        }

        let rows = await fetchSheet(sheetNamePadded);
        let sheetName = sheetNamePadded;

        if (!rows || rows.length === 0) {
          rows = await fetchSheet(sheetNameRaw);
          sheetName = sheetNameRaw;
        }

        if (!rows || rows.length === 0) {
          resultArea.innerHTML = `
            <div class="not-found-card">
              <div class="not-found-title">Sin datos</div>
              <div class="not-found-sub">
                No se encontraron datos para el día <strong>${sheetNamePadded}</strong>.<br><br>
                <strong>DEBUG — pegá esto:</strong><br>
                <code style="font-size:10px;word-break:break-all;">
                  https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=${encodeURIComponent(sheetNamePadded + '!A3:E')}
                </code>
              </div>
            </div>`;
          return;
        }

        const normalize = s =>
          (s || '').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        const nameLower = normalize(name);

        function cellText(cell) {
          if (!cell) return '';
          return String(cell.f ?? cell.v ?? '').trim();
        }

        // El sector a veces solo aparece en la primera fila del grupo,
        // las siguientes lo tienen vacío — hay que heredarlo
        let lastSector = '—';
        let found = null;
        for (const row of rows) {
          const sectorVal = cellText(row.c?.[0]);
          if (sectorVal) lastSector = sectorVal;

          const cellB = cellText(row.c?.[1]);
          if (cellB && normalize(cellB).includes(nameLower)) {
            found = {
              sector:   lastSector,
              franco:   cellText(row.c?.[2]) || '',
              notes:    cellText(row.c?.[4]) || '',
              fullName: cellB
            };
            break;
          }
        }

        if (!found) {
          resultArea.innerHTML = `
            <div class="not-found-card">
              <div class="not-found-title">No encontrado</div>
              <div class="not-found-sub">
                No se encontró "<strong>${escapeHtml(name)}</strong>" en el día <strong>${sheetName}</strong>.
                Revisá que el nombre esté bien escrito.
              </div>
            </div>`;
          return;
        }

        const francoHTML = found.franco
          ? `<div class="result-franco">
               <span class="result-franco-icon">📅</span>
               <span>Franco: <strong>${escapeHtml(found.franco)}</strong></span>
             </div>`
          : '';

        const notesHTML = found.notes
          ? `<div class="result-notes-label">Notas</div>
             <div class="result-notes-value">${escapeHtml(found.notes)}</div>`
          : '';

        resultArea.innerHTML = `
          <div class="result-card">
            <div class="result-header">
              <div class="result-header-dot"></div>
              <div class="result-header-name">${escapeHtml(String(found.fullName))}</div>
            </div>
            <div class="result-body">
              <div class="result-sector-label">Sector asignado</div>
              <div class="result-sector-value">${escapeHtml(String(found.sector))}</div>
              ${francoHTML}
              ${notesHTML}
            </div>
          </div>`;

      } catch (err) {
        resultArea.innerHTML = `
          <div class="error-card">
            ⚠ No se pudo conectar con la planilla.<br><br>
            <small>
              Posibles causas:<br>
              • El Google Sheets no es público todavía (Compartir → Cualquier persona con el enlace → Lector)<br>
              • Problema de conexión a internet<br><br>
              Detalle técnico: ${err.message}
            </small>
          </div>`;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
