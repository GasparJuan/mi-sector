<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mi Sector — Hospital Italiano La Plata</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --azul:       #2c3e50;
      --azul-medio: #34495e;
      --azul-claro: #eaf0f4;
      --acento:     #27ae60;
      --acento2:    #2ecc71;
      --texto:      #1a1a1a;
      --gris:       #5a6a72;
      --borde:      #d5dde3;
      --blanco:     #fff;
      --bg:         #f0f4f7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: #2d2d2d;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo-svg {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-main {
      color: var(--blanco);
      font-family: 'Open Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      color: rgba(255,255,255,0.7);
      font-family: 'Open Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .header-badge {
      background: #3a9c5e;
      color: var(--blanco);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── BANDA AZUL CLARO ── */
    .subheader {
      background: var(--azul-claro);
      border-bottom: 1px solid var(--borde);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subheader-icon {
      color: var(--azul-medio);
      font-size: 14px;
    }

    .subheader-text {
      font-size: 12px;
      color: var(--azul);
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ── CARD ── */
    .card {
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(26,58,107,0.07);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .card-header {
      background: var(--azul-claro);
      border-bottom: 1px solid var(--borde);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-header-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--acento);
      flex-shrink: 0;
    }

    .card-header-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--azul);
    }

    .card-body {
      padding: 18px;
    }

    /* ── FECHA ── */
    .date-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .date-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .date-number {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--azul);
      line-height: 1;
    }

    .date-info-dia {
      font-size: 14px;
      font-weight: 700;
      color: var(--azul-medio);
      text-transform: capitalize;
    }

    .date-info-full {
      font-size: 12px;
      color: var(--gris);
      margin-top: 2px;
      text-transform: capitalize;
    }

    .btn-cambiar {
      background: var(--blanco);
      border: 1.5px solid var(--azul-medio);
      color: var(--azul-medio);
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-cambiar:hover {
      background: var(--azul-medio);
      color: var(--blanco);
    }

    .date-picker-wrap {
      margin-top: 14px;
      display: none;
    }

    .date-picker-wrap.open { display: block; }

    .date-picker-wrap input[type="date"] {
      width: 100%;
      border: 1.5px solid var(--borde);
      color: var(--texto);
      font-family: 'Open Sans', sans-serif;
      font-size: 15px;
      padding: 10px 14px;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.2s;
      background: var(--bg);
    }

    .date-picker-wrap input[type="date"]:focus {
      border-color: var(--azul-medio);
    }

    /* ── BUSCADOR ── */
    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      border: 1.5px solid var(--borde);
      background: var(--bg);
      color: var(--texto);
      font-family: 'Open Sans', sans-serif;
      font-size: 15px;
      padding: 13px 110px 13px 16px;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: #aaa; }

    .search-input:focus {
      border-color: var(--azul-medio);
      box-shadow: 0 0 0 3px rgba(33,85,163,0.1);
      background: var(--blanco);
    }

    .btn-buscar {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--acento);
      border: none;
      color: var(--blanco);
      font-family: 'Open Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      padding: 9px 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-buscar:hover { background: var(--acento2); }
    .btn-buscar:active { transform: translateY(-50%) scale(0.97); }

    /* ── RESULTADO ── */
    .result-area { min-height: 10px; }

    .result-card {
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-top: 4px solid var(--acento);
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(26,58,107,0.09);
      overflow: hidden;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-name-bar {
      background: var(--azul-claro);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--borde);
    }

    .result-name-bar svg {
      width: 16px; height: 16px;
      color: var(--azul-medio);
      flex-shrink: 0;
    }

    .result-name-text {
      font-size: 13px;
      font-weight: 700;
      color: var(--azul);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .result-body {
      padding: 20px 18px;
    }

    .result-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gris);
      margin-bottom: 5px;
    }

    .result-sector {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--acento);
      line-height: 1.1;
      margin-bottom: 18px;
    }

    .result-franco {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--azul-claro);
      border: 1px solid var(--borde);
      border-radius: 6px;
      padding: 9px 13px;
      margin-bottom: 14px;
      font-size: 13px;
      color: var(--azul);
    }

    .result-franco svg {
      width: 14px; height: 14px;
      flex-shrink: 0;
      color: var(--azul-medio);
    }

    .result-notes {
      background: #fffbec;
      border-left: 3px solid #e8a800;
      border-radius: 0 6px 6px 0;
      padding: 10px 14px;
      font-size: 13px;
      color: #5a4200;
      line-height: 1.5;
    }

    /* ── ESTADOS ── */
    .msg-card {
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-radius: 10px;
      padding: 20px 18px;
      animation: fadeUp 0.3s ease;
    }

    .msg-card.error {
      border-left: 4px solid var(--acento);
    }

    .msg-card.warning {
      border-left: 4px solid #e8a800;
    }

    .msg-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .msg-card.error .msg-title { color: var(--acento); }
    .msg-card.warning .msg-title { color: #8a6000; }

    .msg-sub {
      font-size: 13px;
      color: var(--gris);
      line-height: 1.5;
    }

    .loading-card {
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-radius: 10px;
      padding: 28px;
      text-align: center;
      animation: fadeUp 0.3s ease;
    }

    .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--borde);
      border-top-color: var(--azul-medio);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: var(--gris);
    }

    /* ── FOOTER ── */
    footer {
      background: #2d2d2d;
      color: rgba(255,255,255,0.55);
      text-align: center;
      font-size: 11px;
      padding: 14px;
      letter-spacing: 0.5px;
    }

    footer strong { color: rgba(255,255,255,0.85); }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">
      <div class="header-logo-svg">
        <!-- Pétalos del logo Italiano La Plata -->
        <svg width="44" height="44" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- arriba izq: rojo -->
          <path d="M50 50 Q30 40 28 20 Q40 18 50 50Z" fill="#e8614a" opacity="0.9"/>
          <!-- arriba der: verde claro -->
          <path d="M50 50 Q60 30 78 28 Q80 40 50 50Z" fill="#7dba8a" opacity="0.9"/>
          <!-- abajo izq: verde -->
          <path d="M50 50 Q20 60 22 78 Q38 80 50 50Z" fill="#3a9c5e" opacity="0.9"/>
          <!-- abajo der: rojo oscuro -->
          <path d="M50 50 Q70 62 72 80 Q58 82 50 50Z" fill="#c94535" opacity="0.9"/>
        </svg>
        <div class="header-logo-text">
          <span class="logo-main">Italiano</span>
          <span class="logo-sub">LA PLATA</span>
        </div>
      </div>
    </div>
    <div class="header-badge">Mi Sector</div>
  </header>

  <div class="subheader">
    <span class="subheader-icon">📋</span>
    <span class="subheader-text">Consultá tu sector de trabajo del día</span>
  </div>

  <main>

    <!-- Fecha -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-dot"></div>
        <div class="card-header-title">Fecha consultada</div>
      </div>
      <div class="card-body">
        <div class="date-display" onclick="toggleDatePicker()">
          <div class="date-left">
            <div class="date-number" id="dateDayDisplay">—</div>
            <div>
              <div class="date-info-dia" id="dateDiaDisplay">—</div>
              <div class="date-info-full" id="dateFullDisplay">—</div>
            </div>
          </div>
          <button class="btn-cambiar">Cambiar</button>
        </div>
        <div class="date-picker-wrap" id="datePickerWrap">
          <input type="date" id="datePickerInput" onchange="onDateChange()" />
        </div>
      </div>
    </div>

    <!-- Buscador -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-dot"></div>
        <div class="card-header-title">Buscar por nombre</div>
      </div>
      <div class="card-body">
        <div class="search-wrap">
          <input
            class="search-input"
            id="nameInput"
            type="text"
            placeholder="Ingresá tu apellido o nombre..."
            onkeydown="if(event.key==='Enter') buscar()"
            autocomplete="off"
            autocorrect="off"
          />
          <button class="btn-buscar" onclick="buscar()">Buscar</button>
        </div>
      </div>
    </div>

    <!-- Resultado -->
    <div class="result-area" id="resultArea"></div>

  </main>

  <footer>
    <strong>Hospital Italiano de La Plata</strong> &nbsp;·&nbsp; Sistema interno de consulta de sectores
  </footer>

  <script>
    const SHEET_ID = '1L8eyFwLA1EGOXnm9q2uDI-L_NA8OAneOQsNQACVY6AU';
    let currentDate = new Date();

    function pad(n) { return String(n).padStart(2, '0'); }

    function init() {
      updateDateDisplay(currentDate);
    }

    function updateDateDisplay(date) {
      document.getElementById('dateDayDisplay').textContent = pad(date.getDate());
      document.getElementById('dateDiaDisplay').textContent =
        date.toLocaleDateString('es-AR', { weekday: 'long' });
      document.getElementById('dateFullDisplay').textContent =
        date.toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('datePickerInput').value =
        `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
    }

    function toggleDatePicker() {
      document.getElementById('datePickerWrap').classList.toggle('open');
    }

    function onDateChange() {
      const val = document.getElementById('datePickerInput').value;
      if (!val) return;
      const [y, m, d] = val.split('-').map(Number);
      currentDate = new Date(y, m - 1, d);
      updateDateDisplay(currentDate);
      document.getElementById('datePickerWrap').classList.remove('open');
      if (document.getElementById('nameInput').value.trim()) buscar();
    }

    async function fetchSheet(sheetName) {
      const range = encodeURIComponent(`${sheetName}!A3:E`);
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=${range}`;
      const res = await fetch(url);
      const text = await res.text();
      const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)?.[1];
      if (!jsonStr) return [];
      const data = JSON.parse(jsonStr);
      return data?.table?.rows || [];
    }

    function cellText(cell) {
      if (!cell) return '';
      return String(cell.f ?? cell.v ?? '').trim();
    }

    async function buscar() {
      const name = document.getElementById('nameInput').value.trim();
      const resultArea = document.getElementById('resultArea');

      if (!name) {
        resultArea.innerHTML = `
          <div class="msg-card warning">
            <div class="msg-title">Ingresá tu nombre</div>
            <div class="msg-sub">Escribí tu apellido o nombre en el campo de búsqueda.</div>
          </div>`;
        return;
      }

      resultArea.innerHTML = `
        <div class="loading-card">
          <div class="spinner"></div>
          <div class="loading-text">Consultando planilla...</div>
        </div>`;

      try {
        const dayNum = currentDate.getDate();
        const sheetPad = pad(dayNum);
        const sheetRaw = String(dayNum);

        let rows = await fetchSheet(sheetPad);
        let sheetName = sheetPad;
        if (!rows || rows.length === 0) {
          rows = await fetchSheet(sheetRaw);
          sheetName = sheetRaw;
        }

        if (!rows || rows.length === 0) {
          resultArea.innerHTML = `
            <div class="msg-card warning">
              <div class="msg-title">Sin datos para este día</div>
              <div class="msg-sub">No se encontró la hoja <strong>${sheetPad}</strong> en la planilla o no tiene datos cargados.</div>
            </div>`;
          return;
        }

        const normalize = s =>
          (s || '').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        const nameLower = normalize(name);

        let lastSector = '—';
        let found = null;
        for (const row of rows) {
          const sectorVal = cellText(row.c?.[0]);
          if (sectorVal) lastSector = sectorVal;
          const cellB = cellText(row.c?.[1]);
          if (cellB && normalize(cellB).includes(nameLower)) {
            found = {
              sector:   lastSector,
              franco:   cellText(row.c?.[2]) || '',
              notes:    cellText(row.c?.[4]) || '',
              fullName: cellB
            };
            break;
          }
        }

        if (!found) {
          resultArea.innerHTML = `
            <div class="msg-card error">
              <div class="msg-title">No encontrado</div>
              <div class="msg-sub">
                No se encontró "<strong>${escapeHtml(name)}</strong>" en la planilla del día <strong>${sheetName}</strong>.<br>
                Verificá que el nombre esté escrito correctamente.
              </div>
            </div>`;
          return;
        }

        const francoHTML = found.franco ? `
          <div class="result-franco">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Franco: <strong>${escapeHtml(found.franco)}</strong>
          </div>` : '';

        const notesHTML = found.notes ? `
          <div class="result-label" style="margin-top:4px;">Notas</div>
          <div class="result-notes">${escapeHtml(found.notes)}</div>` : '';

        resultArea.innerHTML = `
          <div class="result-card">
            <div class="result-name-bar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
              <div class="result-name-text">${escapeHtml(String(found.fullName))}</div>
            </div>
            <div class="result-body">
              <div class="result-label">Sector asignado</div>
              <div class="result-sector">${escapeHtml(String(found.sector))}</div>
              ${francoHTML}
              ${notesHTML}
            </div>
          </div>`;

      } catch (err) {
        resultArea.innerHTML = `
          <div class="msg-card error">
            <div class="msg-title">Error de conexión</div>
            <div class="msg-sub">
              No se pudo conectar con la planilla. Verificá tu conexión a internet y que el Google Sheets sea público.<br><br>
              <small style="color:#999">${err.message}</small>
            </div>
          </div>`;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
